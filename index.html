<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Cinzel:wght@600;700&display=swap');
        
        :root {
            --bg: #09090f;
            --card: #12121e;
            --border: rgba(201, 168, 76, .22);
            --gold: #c9a84c;
            --gold2: #f0d080;
            --violet: #7c6fa0;
            --vl: #b0a8cc;
            --text: #e4ddf2;
            --dim: #8880a8;
            --green: #5dbf8a;
            --red: #e07070;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html { font-size: 16px; } /* 基準，支援 Dynamic Type */
        
        html, body { max-width: 100%; overflow-x: hidden; }
        body { 
            font-family: 'Noto Serif TC', serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
        }
        
        canvas#bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        
        .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 3rem; overflow-x: hidden; }
        
        #formPage { padding: 1rem .875rem; }
        #reportPage { display: none; }
        
        .fh { text-align: center; padding: 1.5rem 0 1rem; }
        .gl { font-size: 2rem; display: block; animation: glow 3s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(201, 168, 76, .35); } 50% { text-shadow: 0 0 28px rgba(201, 168, 76, .85); } }
        .fh h1 { font-family: Cinzel, serif; font-size: 1.125rem; color: var(--gold); letter-spacing: .1em; margin: .4375rem 0 .1875rem; }
        .fh p { font-size: 0.875rem; color: var(--dim); letter-spacing: .1em; }
        
        .lang-row { display: flex; justify-content: center; margin: .625rem 0; }
        .lang-wrap { display: inline-flex; border: 1px solid var(--border); border-radius: 1.25rem; overflow: hidden; }
        .lb { padding: .3125rem 1.125rem; font-size: 0.875rem; background: transparent; border: none; color: var(--dim); cursor: pointer; font-family: 'Noto Serif TC', serif; transition: all .2s; }
        .lb.active { background: rgba(201, 168, 76, .2); color: var(--gold); }
        
        .fc { background: var(--card); border: 1px solid var(--border); border-radius: .8125rem; padding: 1.0625rem .875rem; margin-bottom: .75rem; }
        .fc-h2 { font-size: 0.875rem; letter-spacing: .15em; color: var(--gold); margin-bottom: .8125rem; }
        .fi { margin-bottom: .6875rem; }
        .fi label { display: block; font-size: 0.875rem; color: var(--vl); margin-bottom: .25rem; }
        .fi input, .fi select { 
            width: 100%; 
            background: rgba(255, 255, 255, .04); 
            border: 1px solid rgba(255, 255, 255, .12); 
            border-radius: .5rem; 
            padding: .5625rem .75rem; 
            color: var(--text); 
            font-size: 1rem; 
            font-family: 'Noto Serif TC', serif; 
            -webkit-appearance: none; 
            transition: border .2s; 
        }
        .fi input:focus, .fi select:focus { outline: none; border-color: var(--gold); }
        .fi select option { background: #1a1a2e; }
        
        .r2 { display: grid; grid-template-columns: 1fr 1fr; gap: .625rem; }
        .r3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: .5625rem; }
        
        .btn-go { 
            width: 100%; 
            padding: .75rem; 
            border-radius: .625rem; 
            background: linear-gradient(135deg, rgba(201, 168, 76, .25), rgba(124, 111, 160, .25)); 
            border: 1px solid var(--gold); 
            color: var(--gold); 
            cursor: pointer; 
            font-family: 'Noto Serif TC', serif; 
            font-size: 1rem; 
            letter-spacing: .07em; 
            transition: all .25s; 
        }
        .btn-go:hover { background: linear-gradient(135deg, rgba(201, 168, 76, .4), rgba(124, 111, 160, .36)); }
        
        .err { color: var(--red); font-size: 0.875rem; margin-top: .375rem; min-height: 1.125rem; text-align: center; }
        .src-note { font-size: 0.8125rem; color: var(--dim); text-align: center; margin-top: .5rem; line-height: 1.5; }
        .src-note a { color: var(--gold); text-decoration: none; }
        
        .hero { 
            background: linear-gradient(175deg, #0f1028 0%, #09091a 70%, var(--bg) 100%); 
            padding: 1.375rem .625rem .875rem; 
            text-align: center; 
            border-bottom: 1px solid var(--border); 
            position: relative; 
            overflow: hidden; 
        }
        .hero-lang { position: absolute; top: .625rem; left: .5rem; }
        .hero-btns { position: absolute; top: .625rem; right: .5rem; display: flex; flex-direction: column; gap: .25rem; align-items: flex-end; }
        .hbtn { 
            background: rgba(255, 255, 255, .06); 
            border: 1px solid rgba(255, 255, 255, .12); 
            border-radius: .4375rem; 
            padding: .1875rem .4375rem; 
            color: var(--dim); 
            font-size: 0.75rem; 
            cursor: pointer; 
            font-family: 'Noto Serif TC', serif; 
            white-space: nowrap; 
            transition: all .2s; 
        }
        .hbtn:hover { border-color: var(--gold); color: var(--gold); }
        
        .ava { 
            width: 3.125rem; 
            height: 3.125rem; 
            border-radius: 50%; 
            background: linear-gradient(135deg, var(--violet), var(--gold)); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.375rem; 
            margin: 0 auto .5625rem; 
            box-shadow: 0 0 1rem rgba(201, 168, 76, .28); 
        }
        .hero-name { 
            font-family: Cinzel, serif; 
            font-size: 1.125rem; 
            color: var(--gold2); 
            margin-bottom: .5625rem; 
            word-break: break-all; 
        }
        .tags { 
            display: flex; 
            flex-wrap: wrap; 
            gap: .25rem; 
            justify-content: center; 
            margin-bottom: .375rem; 
            padding: 0 .5rem; 
        }
        .tag { 
            display: inline-flex; 
            align-items: center; 
            gap: .1875rem; 
            padding: .1875rem .5rem; 
            border-radius: 1rem; 
            font-size: 0.8125rem; 
            border: 1px solid var(--border); 
            background: rgba(201, 168, 76, .08); 
            color: var(--gold2); 
            word-break: break-all; 
        }
        .rsrc { font-size: 0.8125rem; color: var(--dim); margin-top: .25rem; }
        
        .wnav { 
            display: flex; 
            align-items: center; 
            padding: .625rem .875rem; 
            background: var(--card); 
            border-bottom: 1px solid var(--border); 
        }
        .wnb { 
            background: rgba(255, 255, 255, .04); 
            border: 1px solid rgba(255, 255, 255, .1); 
            color: var(--dim); 
            padding: .3125rem .75rem; 
            border-radius: .4375rem; 
            cursor: pointer; 
            font-size: 0.875rem; 
            flex-shrink: 0; 
            transition: all .2s; 
        }
        .wnb:hover { border-color: var(--gold); color: var(--gold); }
        .wlbl { flex: 1; text-align: center; font-size: 0.875rem; color: var(--gold2); padding: 0 .25rem; line-height: 1.4; word-break: break-all; }
        
        .sec { padding: .8125rem .75rem 0; }
        .slbl { 
            font-size: 0.8125rem; 
            letter-spacing: .15em; 
            color: var(--gold); 
            text-transform: uppercase; 
            margin-bottom: .75rem; 
            display: flex; 
            align-items: center; 
            gap: .375rem; 
            word-break: break-all; 
        }
        .slbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        
        .tip-item { 
            font-size: 1.125rem; 
            color: var(--gold2); 
            font-weight: 700; 
            line-height: 1.65; 
            margin-bottom: .75rem; 
            word-break: break-word; 
            white-space: normal; 
        }
        .tlist { margin-top: .5rem; font-size: 1rem; color: var(--vl); line-height: 1.65; }
        .titem { 
            margin-bottom: .75rem; 
            word-break: break-word; 
            padding-bottom: .375rem; 
            border-bottom: 1px dashed rgba(255, 255, 255, .06); 
        }
        .tplanet { color: var(--gold2); font-weight: 600; }
        .thouse { color: var(--violet); font-weight: 600; }
        
        .lgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .25rem; }
        .lt { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: .625rem; 
            padding: .5rem .25rem; 
            text-align: center; 
            min-width: 0; 
            overflow: hidden; 
        }
        .llt { font-size: 0.8125rem; color: var(--dim); margin-bottom: .1875rem; }
        .llv { 
            font-size: 0.9375rem; 
            color: var(--gold2); 
            font-weight: 700; 
            line-height: 1.35; 
            word-break: break-all; 
        }
        
        .agrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .75rem; }
        .atile { 
            background: linear-gradient(180deg, rgba(255, 255, 255, .035), rgba(255, 255, 255, .015)); 
            border: 1px solid var(--border); 
            border-radius: 1rem; 
            padding: 1.25rem 1rem 1.125rem; 
            text-align: center; 
            cursor: pointer; 
            transition: all .2s; 
            overflow: hidden; 
            word-break: break-word; 
            min-width: 0; 
            box-shadow: 0 .5rem 1.75rem rgba(0, 0, 0, .16); 
        }
        .atile:hover { border-color: rgba(215, 180, 92, .65); transform: translateY(-.125rem) scale(1.01); }
        .atile div:first-child { font-size: 1.375rem; margin-bottom: .3125rem; }
        .atile div:nth-child(2) { font-size: 0.8125rem; color: var(--dim); margin-bottom: .25rem; word-break: break-all; line-height: 1.3; }
        
        .drow { 
            display: flex; 
            align-items: flex-start; 
            gap: .3125rem; 
            padding: .5rem .5625rem; 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: .625rem; 
            margin-bottom: .375rem; 
            flex-wrap: wrap; 
        }
        .dr-d { font-size: 1rem; color: var(--dim); min-width: 4.25rem; flex-shrink: 0; }
        .dr-moon { font-size: 1rem; color: var(--vl); min-width: 3.375rem; flex-shrink: 0; letter-spacing: -.01em; }
        .dr-t { font-size: 1rem; color: var(--text); flex: 1; line-height: 1.54; min-width: 0; word-break: break-word; }
        .dtag { 
            font-size: 0.75rem; 
            padding: .125rem .4375rem; 
            border-radius: .5rem; 
            border: 1px solid; 
            flex-shrink: 0; 
            white-space: nowrap; 
        }
        .dtag.up { border-color: rgba(93, 191, 138, .4); color: var(--green); }
        .dtag.mid { border-color: var(--border); color: var(--gold); }
        .dtag.low { border-color: rgba(224, 112, 112, .3); color: var(--red); }
        
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, .86); 
            z-index: 100; 
            align-items: flex-end; 
            justify-content: center; 
            backdrop-filter: blur(8px); 
        }
        .modal.open { display: flex; }
        .msheet { 
            background: linear-gradient(180deg, #101020 0%, #0d0d1a 100%); 
            border: 1px solid var(--border); 
            border-radius: 1.125rem 1.125rem 0 0; 
            padding: 1.125rem 1rem 2.125rem; 
            width: 100%; 
            max-width: 28.75rem; 
            max-height: 82vh; 
            overflow-y: auto; 
            overflow-x: hidden; 
            word-break: break-word; 
            box-shadow: 0 -.75rem 2.5rem rgba(0, 0, 0, .35); 
        }
        .mhead { display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem; }
        .mclose { margin-left: auto; background: none; border: none; color: var(--dim); font-size: 1.25rem; cursor: pointer; }
        .mtrend { 
            background: rgba(124, 111, 160, .12); 
            border-left: 3px solid var(--violet); 
            border-radius: 0 .4375rem .4375rem 0; 
            padding: .5rem .6875rem; 
            font-size: 0.9375rem; 
            color: var(--vl); 
            line-height: 1.72; 
            margin-bottom: .75rem; 
        }
        .mex { margin-top: .5rem; font-size: 0.875rem; color: var(--dim); line-height: 1.7; }
        .macts { list-style: none; }
        .macts li { 
            padding: .375rem 0; 
            font-size: 0.9375rem; 
            color: var(--text); 
            line-height: 1.5; 
            border-bottom: 1px solid rgba(255, 255, 255, .05); 
            display: flex; 
            gap: .4375rem; 
        }
        .macts li::before { content: '★'; color: var(--gold); flex-shrink: 0; }
        .macts li:last-child { border-bottom: none; }
        
        /* 響應式：支援放大文字，避免重疊 */
        @media (prefers-reduced-motion: no-preference) {
            /* Dynamic Type 支援：iOS 自動調整 */
        }
        
        /* 特大號字體優化：增加 flex-wrap, min-height */
        @media screen and (min-height: 0px) { /* 模擬大字體空間壓縮 */
            .wrap { padding-bottom: 4rem; }
            .r2, .r3, .lgrid, .agrid { gap: 1rem; }
            .drow { flex-direction: column; gap: .5rem; }
            body { line-height: 1.6; } /* 增加行高 */
        }
        
        /* 確保文字換行 */
        * { overflow-wrap: break-word; hyphens: auto; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="wrap">
        <!-- 原 HTML 內容保持不變，僅 style 修改 -->
        <div id="formPage">
            <!-- form 元素... (完整保留原代碼中的 formPage 內容) -->
        </div>
        <div id="reportPage">
            <!-- report 元素... (完整保留) -->
        </div>
    </div>
    <!-- script 保持原樣 -->
    <script>
        // 原 JS 代碼完整保留，無需修改
    </script>
</body>
</html>
